theme = dark:"Monospace Dark",light:"Muxy"
# Fuente
font-family = FiraCode Nerd Font
font-size = 14

# Transparencia
background-opacity = 1.0
unfocused-split-opacity = 0.2

# Ventana
window-decoration = false
window-padding-balance = true
window-step-resize = false
macos-titlebar-style = hidden
window-padding-x = 8
window-padding-y = 8

# Cursor
cursor-style = block_hollow

# Cursor con efecto suave
# Opciones disponibles: cursor_smear_soft, cursor_blaze, cursor_frozen, cursor_smear_rainbow
custom-shader = shaders/cursor_smear_soft.glsl

# Integración con shell
shell-integration = zsh

# Sin macos-option-as-alt: Option sigue siendo Option en ambos lados (tildes/ñ funcionan normal)

# Comportamiento
scrollback-limit = 10000
copy-on-select = clipboard
right-click-action = paste

# Splits
keybind = cmd+shift+d=new_split:down
keybind = cmd+shift+z=toggle_split_zoom
keybind = ctrl+opt+left=resize_split:left,20
keybind = ctrl+opt+right=resize_split:right,20
keybind = ctrl+opt+up=resize_split:up,20
keybind = ctrl+opt+down=resize_split:down,20
keybind = ctrl+opt+equal=equalize_splits
