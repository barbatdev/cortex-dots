# tmux.conf — Dev Environment
# Prefix: Ctrl+A

#region Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix
#endregion

#region Terminal
# True color para que los colores del tema funcionen
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ",*:RGB"
set -as terminal-features ",*:usstyle"
set -as terminal-features ",*:hyperlinks"

# Propagar extended keys (shift+enter, ctrl+space, etc.) a apps que las soportan
# Requiere terminal exterior con kitty keyboard protocol (Ghostty/muxy/iTerm2/WezTerm/Kitty)
set -g extended-keys on
set -s extended-keys-format csi-u
set -ga terminal-features 'xterm*:extkeys'
#endregion

#region General
# Numeración desde 1 (más cómodo que 0)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Sin delay en ESC (bueno para micro/nvim)
set -s escape-time 0

# Historia larga
set -g history-limit 50000

# Mouse habilitado
set -g mouse on

# Título de la ventana del terminal
set -g set-titles on
set -g set-titles-string "#S / #W"
#endregion

#region Vi Keys
# Copy mode con vi keys
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel
#endregion

#region Window/Pane Management
# Splits que mantienen el directorio actual
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Navegación entre panes con hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize de panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
#endregion

#region Reload
bind r source-file ~/.tmux.conf \; display "  Config recargada"
#endregion

#region Scratch Session
# Ventana flotante con Alt+G — sobre cualquier layout, sin romper el contexto actual
bind-key -n M-g if-shell -F '#{==:#{session_name},scratch}' {
  detach-client
} {
  display-popup -d "#{pane_current_path}" -E "tmux new-session -A -s scratch"
}
#endregion

#region Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'alexwforsythe/tmux-which-key'
#endregion

#region Status Bar — Dark
set -g status-style "bg=#0c0c0c,fg=#ffffff"
set -g status-position bottom
set -g status-interval 5

# Izquierda: nombre de sesión
set -g status-left "#[fg=#16c60c,bold] #S #[default] "
set -g status-left-length 30

# Derecha: hora y fecha
set -g status-right "#[fg=#555555]%H:%M  %d/%m "

# Ventanas
set -g window-status-format         "#[fg=#555555] #I:#W "
set -g window-status-current-format "#[fg=#16c60c,bold] #I:#W "

# Bordes de panes
set -g pane-border-style        "fg=#333333"
set -g pane-active-border-style "fg=#16c60c"

# Mensajes
set -g message-style "bg=#16c60c,fg=#0c0c0c,bold"
#endregion

# Inicializar TPM (debe ser la última línea del archivo)
run '~/.tmux/plugins/tpm/tpm'
